<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR AI Assistant</title>

    <link rel="stylesheet" href="/frontend/style.css">
</head>

<body>

<div class="container">

    <div class="chat-card">

        <div class="header">
            <h2>HR AI Assistant</h2>
            <p>Ask questions related to Leave, Payroll, Jobs and Workforce</p>
        </div>

        <div id="chat-box" class="chat-box">

            <div class="message bot">
                <strong>HR Assistant</strong><br><br>

                Welcome 👋

                <br><br>

                You can ask questions like:

                <ul>
                    <li>How do I apply for leave?</li>
                    <li>Explain payroll basics.</li>
                    <li>How is a job created?</li>
                    <li>What is workforce management?</li>
                </ul>

            </div>

        </div>

        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Type your HR question..."
            >

            <button id="send-btn">
                Send
            </button>

        </div>

    </div>

</div>

<script src="/frontend/script.js"></script>

</body>
</html>
